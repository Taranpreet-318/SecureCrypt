<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — SecureCrypt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>
<body>

<header>
  <div class="wrap nav">
    <a class="brand" href="{{ url_for('login_page') }}">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#1c1200" stroke-width="2.4"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></div>
      <div>SecureCrypt<small>Encrypt. Protect. Trust.</small></div>
    </a>
    <div class="nav-actions">
      <a class="btn btn-outline" href="{{ url_for('signup_page') }}">Create account</a>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/><circle cx="12" cy="15.5" r="1.4"/></svg></div>
    <h1>Welcome back</h1>
    <p class="sub">Log in to reach your dashboard and the encrypt/decrypt tool.</p>

    <div class="alert alert-error" id="formAlert"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username or email</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="remember-row">
        <label><input type="checkbox" id="remember"> Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">Log in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{{ url_for('signup_page') }}">Sign up</a>
    </div>
  </div>
</div>

<footer>© 2026 SecureCrypt. Your files, your password, your control.</footer>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
